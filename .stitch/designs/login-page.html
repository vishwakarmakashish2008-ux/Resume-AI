            background: rgba(15, 23, 42, 0.6);

<body class="min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Background Elements -->
<div class="fixed inset-0 grid-overlay z-0"></div>
<div class="gradient-orb bg-primary top-[-10%] left-[-10%]"></div>
<div class="gradient-orb bg-secondary bottom-[-10%] right-[-10%]"></div>
<div class="gradient-orb bg-tertiary top-[40%] right-[-5%]"></div>
<!-- Main Content Shell -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Center Login Card -->
<div class="glass-card rounded-2xl p-8 md:p-10 shadow-2xl">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="relative w-16 h-16 rounded-xl primary-gradient flex items-center justify-center mb-4 shadow-lg">
<span class="material-symbols-outlined text-surface text-3xl" data-weight="fill">description</span>
<div class="absolute -top-1 -right-1 w-6 h-6 bg-tertiary rounded-full flex items-center justify-center border-2 border-surface">
<span class="material-symbols-outlined text-on-tertiary text-xs font-bold">check</span>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface">
                    Resume<span class="bg-clip-text text-transparent primary-gradient">AI</span>
</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-tight uppercase opacity-70">Architecting Careers</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors text-xl">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-0 rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 transition-all duration-300" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-white transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container-highest border-0 rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded border-0 bg-surface-container-highest text-primary focus:ring-offset-surface focus:ring-primary transition-all" id="remember" name="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-4 primary-gradient text-on-primary font-bold rounded-xl glow-shadow hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest">
<span class="bg-surface-container-low px-4 text-on-surface-variant font-bold">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-3 bg-white/5 hover:bg-white/10 border border-white/5 rounded-xl transition-all">

<span class="text-sm font-semibold text-on-surface">Google</span>
</button>

<span class="text-sm font-semibold text-on-surface">GitHub</span>

</div>

<p class="text-center mt-10 text-on-surface-variant text-sm">
                Don't have an account?
